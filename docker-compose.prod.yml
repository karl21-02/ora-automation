services:
  db:
    image: postgres:16-alpine
    container_name: ora-automation-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mimir_db}
      POSTGRES_USER: ${POSTGRES_USER:-mimir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mimir_secret_password}
    ports:
      - "5432:5432"
    volumes:
      - ora_automation_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mimir} -d ${POSTGRES_DB:-mimir_db}"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ora-automation-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ora-automation-api
    working_dir: /workspace/Ora/ora-automation
    command: uvicorn ora_automation_api.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://mimir:mimir_secret_password@db:5432/mimir_db}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RABBITMQ_EXCHANGE: ora.automation
      RABBITMQ_RETRY_EXCHANGE: ora.automation.retry
      RABBITMQ_DLX_EXCHANGE: ora.automation.dlx
      RABBITMQ_QUEUE_PREFIX: ora.automation.agent
      ORA_AUTOMATION_LLM_PLANNER_TIMEOUT_SECONDS: ${ORA_AUTOMATION_LLM_PLANNER_TIMEOUT_SECONDS:-30}
      ORA_AUTOMATION_ROOT: /workspace/Ora/ora-automation
      ORA_AUTOMATION_RUN_OUTPUT: /workspace/Ora/ora-automation/research_reports/api_runs
      ORA_PROJECTS_ROOT: /workspace/Ora
      PYTHONUNBUFFERED: "1"
      # Gemini
      ORA_RD_LLM_PROVIDER: gemini
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GOOGLE_CLOUD_PROJECT_ID: ${GOOGLE_CLOUD_PROJECT_ID}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-asia-northeast3}
      ORA_RD_GEMINI_DISABLE_VERTEX: "0"
      GOOGLE_CLOUD_FALLBACK_LOCATIONS: ${GOOGLE_CLOUD_FALLBACK_LOCATIONS:-us-central1,us-east1,europe-west1}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ora-automation-frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  ora_automation_pgdata:
